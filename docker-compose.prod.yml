services:
  db:
    image: ankane/pgvector:latest
    container_name: sales_ai_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sales_network_prod

  redis:
    image: redis:alpine
    container_name: sales_ai_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sales_network_prod

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales_ai_web_prod
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    # Note: No volumes in production. Code is baked into the image.
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sales_network_prod

networks:
  sales_network_prod:
    driver: bridge

volumes:
  postgres_data_prod:
